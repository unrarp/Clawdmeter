; Standalone mDNS / WiFi pre-validation spike for the BLE→WiFi transport plan
; (docs/plans/2026-06-02-wifi-transport.md, "Build/QA → mDNS pre-validation").
;
; THROWAWAY: this is an isolated PlatformIO project with NO display/LVGL/NimBLE
; deps — just the Arduino core's WiFi + ESPmDNS + HTTPClient. Its only job is to
; answer one question on YOUR network: can the ESP32 resolve the daemon host's
; `<hostname>.local` and open a TCP connection to it? If yes → mDNS in v1. If no
; → fall back to a static IP string in net_config.h (the locked decision).
;
; Flash the env matching your board, then watch serial @115200:
;   pio run -d firmware/tools/mdns_spike -e mdns_spike_s3 -t upload -t monitor
; Device path differs by OS — append e.g. `--upload-port /dev/ttyACM0` (Linux)
; or `--upload-port /dev/cu.usbmodem101` (macOS) if auto-detect picks wrong.
;
; Fill creds in include/spike_config.h first (copy from spike_config.example.h).

[env:mdns_spike_s3]
; ESP32-S3 — matches waveshare_amoled_216 and waveshare_amoled_18.
platform = https://github.com/pioarduino/platform-espressif32/releases/download/55.03.38-1/platform-espressif32.zip
board = esp32-s3-devkitc-1
framework = arduino
upload_speed = 921600
monitor_speed = 115200
build_flags =
    -DARDUINO_USB_CDC_ON_BOOT=1

[env:mdns_spike_c6]
; ESP32-C6 — matches waveshare_amoled_216_c6. C6 has only USB-Serial-JTAG, so
; it needs BOTH USB flags (see the main platformio.ini C6 comment).
platform = https://github.com/pioarduino/platform-espressif32/releases/download/55.03.38-1/platform-espressif32.zip
board = esp32-c6-devkitc-1
framework = arduino
upload_speed = 921600
monitor_speed = 115200
build_flags =
    -DARDUINO_USB_CDC_ON_BOOT=1
    -DARDUINO_USB_MODE=1
