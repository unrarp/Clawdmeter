; Standalone TLS / provider-API pre-validation spike for the token-broker plan
; (docs/plans/2026-06-04-token-broker-self-sufficient.md, Phase 1 — the gate).
;
; THROWAWAY: isolated PlatformIO project, NO display/LVGL/board HAL — just the
; Arduino core's WiFi + WiFiClientSecure + HTTPClient and ArduinoJson. Its only
; job: prove the ESP32-S3 can do cert-validated HTTPS to api.anthropic.com and
; chatgpt.com, scrape the Claude rate-limit headers, parse the Codex usage JSON,
; and detect a 401 — the exact device-direct calls the firmware rewrite depends
; on. If this fails, STOP and rethink the firmware approach before Phase 3.
;
; Flash the env matching your board, then watch serial @115200:
;   pio run -d firmware/tools/tls_spike -e tls_spike_s3 -t upload -t monitor
; Append e.g. `--upload-port /dev/ttyACM0` (Linux) / `/dev/cu.usbmodem101` (mac)
; if auto-detect picks wrong.
;
; Fill creds in include/spike_config.h first (copy from spike_config.example.h,
; or run the generator in README.md).

[env:tls_spike_s3]
; ESP32-S3 — matches waveshare_amoled_216 and waveshare_amoled_18.
platform = https://github.com/pioarduino/platform-espressif32/releases/download/55.03.38-1/platform-espressif32.zip
board = esp32-s3-devkitc-1
framework = arduino
upload_speed = 921600
monitor_speed = 115200
lib_deps =
    bblanchon/ArduinoJson@^7.0.0
build_flags =
    -DARDUINO_USB_CDC_ON_BOOT=1

[env:tls_spike_c6]
; ESP32-C6 — matches waveshare_amoled_216_c6. C6 has only USB-Serial-JTAG, so
; it needs BOTH USB flags (see the main platformio.ini C6 comment).
platform = https://github.com/pioarduino/platform-espressif32/releases/download/55.03.38-1/platform-espressif32.zip
board = esp32-c6-devkitc-1
framework = arduino
upload_speed = 921600
monitor_speed = 115200
lib_deps =
    bblanchon/ArduinoJson@^7.0.0
build_flags =
    -DARDUINO_USB_CDC_ON_BOOT=1
    -DARDUINO_USB_MODE=1
