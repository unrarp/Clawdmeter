<svg xmlns="http://www.w3.org/2000/svg" viewBox="-15 -25 45 45" width="500" height="500">
  <defs>
    <style>
      .walk-bob {
        animation: walk-bob 1.2s infinite ease-in-out;
      }
      @keyframes walk-bob {
        0%, 30%, 50%, 80%, 100% { transform: translateY(0); }
        15% { transform: translateY(-0.3px); }
        65% { transform: translateY(-0.3px); }
      }

      .breathe {
        transform-origin: 7.5px 13px;
        animation: breathe 3.2s infinite ease-in-out;
      }
      @keyframes breathe {
        0%, 100% { transform: scale(1, 1) translate(0, 0); }
        50% { transform: scale(1.02, 0.98) translate(0, 0.5px); }
      }

      .eyes-look {
        animation: eyes-look 5s infinite ease-in-out;
      }
      @keyframes eyes-look {
        0%, 100% { transform: translate(0.3px, -1px); }      25%      { transform: translate(-0.3px, -1px); }     50%      { transform: translate(0.3px, -1px); }      68%      { transform: translate(0, -1px); }          73%      { transform: translate(0, 0.3px); }         80%      { transform: translate(0, 0.3px); }         85%      { transform: translate(0, -1px); }          }

      .eyes-blink {
        transform-origin: 7.5px 9px;
        animation: blink 4s infinite;
      }
      @keyframes blink {
        0%, 8%, 100% { transform: scaleY(1); }
        4% { transform: scaleY(0.1); }
      }

      .shadow {
        transform-origin: 7.5px 15.5px;
        animation: shadow-pulse 3.2s infinite ease-in-out;
      }
      @keyframes shadow-pulse {
        0%, 100% { transform: scaleX(1); opacity: 0.5; }
        50% { transform: scaleX(1.05); opacity: 0.45; }
      }

      .legs-a {
        animation: step-a 1.2s infinite;
      }
      .legs-b {
        animation: step-b 1.2s infinite;
      }
      @keyframes step-a {
        0%, 30%, 100% { transform: translateY(0); }
        15% { transform: translateY(-1px); }
      }
      @keyframes step-b {
        0%, 50%, 80%, 100% { transform: translateY(0); }
        65% { transform: translateY(-1px); }
      }

      .sway-base {
        transform-origin: 7.5px 6px;
        animation: sway-base 3s infinite ease-in-out;
      }
      .sway-mid {
        transform-origin: 7px 3px;
        animation: sway-mid 2.5s infinite ease-in-out;
      }
      .sway-top {
        transform-origin: 7.5px 0px;
        animation: sway-top 2s infinite ease-in-out;
      }

      @keyframes sway-base {
        0%, 50%, 100% { transform: translate(0, 0) rotate(0deg); }
        25% { transform: translate(0.8px, 0) rotate(1.5deg); }
        75% { transform: translate(-0.8px, 0) rotate(-1.5deg); }
      }
      @keyframes sway-mid {
        0%, 50%, 100% { transform: translate(0, 0) rotate(0deg); }
        25% { transform: translate(0.6px, 0) rotate(2deg); }
        75% { transform: translate(-0.6px, 0) rotate(-2deg); }
      }
      @keyframes sway-top {
        0%, 50%, 100% { transform: translate(0, 0) rotate(0deg); }
        25% { transform: translate(1px, 0.2px) rotate(3deg); }
        75% { transform: translate(-1px, 0.2px) rotate(-3deg); }
      }

      .arm-l {
        transform-origin: 2px 10px;
        animation: arm-l-bal 3s infinite ease-in-out;
      }
      .arm-r {
        transform-origin: 13px 10px;
        animation: arm-r-bal 3s infinite ease-in-out;
      }
      @keyframes arm-l-bal {
        0%, 50%, 100% { transform: rotate(30deg); }
        25% { transform: rotate(40deg); }
        75% { transform: rotate(20deg); }
      }
      @keyframes arm-r-bal {
        0%, 50%, 100% { transform: rotate(-30deg); }
        25% { transform: rotate(-20deg); }
        75% { transform: rotate(-40deg); }
      }

      .sweat {
        opacity: 0;
        animation: sweat-fly 6s infinite;
      }
      @keyframes sweat-fly {
        0%, 55% { opacity: 0; transform: translate(0, 0) scale(0); }
        60% { opacity: 1; transform: translate(0, 0) scale(1); }
        80% { opacity: 0; transform: translate(-4px, -5px) scale(0.5); }
        100% { opacity: 0; }
      }
    </style>
  </defs>

  <rect class="shadow" x="3" y="15" width="9" height="1" fill="#000"/>

  <g class="walk-bob">
  <g class="breathe">

    <g fill="#DE886D">
      <g class="legs-a">
        <rect x="3" y="13" width="1" height="2"/>
        <rect x="11" y="13" width="1" height="2"/>
      </g>
      <g class="legs-b">
        <rect x="5" y="13" width="1" height="2"/>
        <rect x="9" y="13" width="1" height="2"/>
      </g>
    </g>

    <rect x="2" y="6" width="11" height="7" fill="#DE886D"/>

    <g class="eyes-look">
      <g class="eyes-blink" fill="#000">
        <rect x="4" y="8" width="1" height="2"/>
        <rect x="10" y="8" width="1" height="2"/>
      </g>
    </g>

    <g class="sway-base">
      <rect x="4" y="3" width="7" height="3" fill="#5C9CE6"/>
      <rect x="4" y="5" width="7" height="1" fill="#4A80C4"/>
      <rect x="7" y="3.5" width="1" height="2" fill="#7AB8F5" opacity="0.5"/>

      <g class="sway-mid">
        <rect x="3" y="0" width="7" height="3" fill="#7BC67E"/>
        <rect x="3" y="2" width="7" height="1" fill="#5EA661"/>
        <rect x="6" y="0.5" width="1" height="2" fill="#9AD89C" opacity="0.5"/>

        <g class="sway-top">
          <rect x="5" y="-3" width="7" height="3" fill="#F0A050"/>
          <rect x="5" y="-1" width="7" height="1" fill="#D08030"/>
          <rect x="8" y="-2.5" width="1" height="2" fill="#F8C888" opacity="0.5"/>
        </g>
      </g>
    </g>

    <g class="arm-l" fill="#DE886D">
      <rect x="0" y="9" width="2" height="2"/>
    </g>
    <g class="arm-r" fill="#DE886D">
      <rect x="13" y="9" width="2" height="2"/>
    </g>

    <g transform="translate(0, 6)">
      <g class="sweat" fill="#64D2FF">
        <rect x="0" y="1" width="1" height="1"/>
        <rect x="0.25" y="0" width="0.5" height="1"/>
      </g>
    </g>

  </g>
  </g>
</svg>
